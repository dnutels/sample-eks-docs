# Always-on reserved pool. replicas keeps ODCR-backed nodes running; the scheduler places GPU pods
# here first. capacity-type=reserved + the gpu-static NodeClass (tag-selected ODCR) constrain
# Karpenter to the reservation, so the instance type is resolved from the ODCR (no need to pin it).
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: gpu-static
spec:
  replicas: ${replicas}
  template:
    metadata:
      labels:
        guide: ai-eks-docs
    spec:
      nodeClassRef:
        group: eks.amazonaws.com
        kind: NodeClass
        name: gpu-static
      taints:
        - key: nvidia.com/gpu
          effect: NoSchedule
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["reserved"]
