# Overflow pool. When the static reserved nodes are full, pods go Pending and Karpenter provisions
# spot/on-demand nodes here. References the Auto Mode-managed `default` NodeClass.
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: gpu-dynamic
spec:
  template:
    metadata:
      labels:
        guide: ai-eks-docs
    spec:
      nodeClassRef:
        group: eks.amazonaws.com
        kind: NodeClass
        name: default
      taints:
        - key: nvidia.com/gpu
          effect: NoSchedule
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]
        - key: eks.amazonaws.com/instance-category
          operator: In
          values: ["g"]
        - key: eks.amazonaws.com/instance-generation
          operator: Gt
          values: ["4"]
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
  limits:
    nvidia.com/gpu: 64
